<!DOCTYPE html>
<html>
<head>
<title>Top Up MLBB</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
}

input{
width:200px;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:#2b6cff;
color:white;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
width:120px;
}

button:hover{
background:#1f4ed8;
}

.box{
margin-top:30px;
}

</style>
</head>

<body>

<h2>TOP UP DIAMOND MLBB</h2>

<div class="box">

<input id="id" placeholder="User ID"><br>
<input id="server" placeholder="Server"><br>

<h3>Pilih Diamond</h3>

<button onclick="pilih(5,1500)">5 💎</button>
<button onclick="pilih(12,3500)">12 💎</button>
<button onclick="pilih(19,5500)">19 💎</button>
<button onclick="pilih(28,7500)">28 💎</button>
<button onclick="pilih(44,11500)">44 💎</button>

</div>

<h3 id="total"></h3>

<button onclick="order()">ORDER</button>

<script>

let region = localStorage.getItem("region")
let diamond = 0
let harga = 0

function pilih(d,h){

diamond=d
harga=h

let pajak = harga*0.11
let total = harga+pajak+300

document.getElementById("total").innerHTML=
"Total Bayar: Rp "+Math.floor(total)

}

function order(){

let id=document.getElementById("id").value
let server=document.getElementById("server").value

let pesan="Halo saya mau top up MLBB"+
"%0ARegion: "+region+
"%0AID: "+id+"("+server+")"+
"%0ADiamond: "+diamond

window.open("https://wa.me/62821367491916?text="+pesan)

}

</script>

</body>
</html>
